name: Actualizar Catalogo Semanal

on:
  schedule:
    # Cada lunes a las 6:00 AM UTC (1:00 AM Colombia)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Ejecutar actualizacion semanal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node scripts/actualizacion-semanal.mjs

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actualizacion-log-${{ github.run_number }}
          path: scripts/actualizacion-semanal-log.txt
          retention-days: 30
